name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run Go tests with coverage
        run: go test ./... -v -cover -coverprofile=coverage.out

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

  build-and-push-docker:
    name: Build and Push Docker
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    env:
      TEST_TAG: localhost:5001/actions/git-mirror-action:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory ${{ github.workspace }}

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Run the Container (dry-run)
        run: |
          docker run \
            --env INPUT_TARGETS="generic::https://example.com/repo.git" \
            --env INPUT_DRY_RUN="true" \
            --rm ${{ env.TEST_TAG }} 2>&1 || true

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Run binary directly (dry validation)
        run: |
          go build -o git-mirror-action ./cmd/main.go
          INPUT_TARGETS="generic::https://example.com/repo.git" INPUT_DRY_RUN="true" ./git-mirror-action 2>&1 || true

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-tests
      - build-and-push-docker
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
